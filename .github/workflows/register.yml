name: Register recovered account

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  register:
    # 登録用 Issue のみ処理する
    if: startsWith(github.event.issue.title, '[recovered]')
    runs-on: ubuntu-latest
    concurrency:
      group: registry
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Assign serial number and update counter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 登録されるのは Issue 作者本人のログイン名。なりすましは不可。
          CLAIMANT: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          set -euo pipefail

          existing=$(jq -r --arg login "$CLAIMANT" \
            '[.[] | select(.login == $login)][0].number // empty' registry.json)
          if [ -n "$existing" ]; then
            gh issue comment "$ISSUE_NUMBER" --body \
              "@${CLAIMANT} さんはすでに **#${existing}** として登録済みです。"
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi

          timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 観測ワークフローのコミットと push が競合しうるため、
          # 常に最新の origin/main の上で採番し直してリトライする
          number=""
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            number=$(( $(jq 'length' registry.json) + 1 ))

            jq --arg login "$CLAIMANT" \
               --argjson number "$number" \
               --arg ts "$timestamp" \
               --arg issue "$ISSUE_URL" \
               '. + [{number: $number, login: $login, recovered_at: $ts, registration_issue: $issue}]' \
               registry.json > registry.tmp && mv registry.tmp registry.json

            jq -n --arg n "$number" \
              '{schemaVersion: 1, label: "recovered accounts", message: $n, color: "brightgreen"}' \
              > counter.json

            git add registry.json counter.json
            git commit --allow-empty-message -m ''
            if git push; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "::error::push failed after 3 attempts"
              exit 1
            fi
            echo "push rejected, retrying (${attempt}/3)"
            sleep 5
          done

          gh issue comment "$ISSUE_NUMBER" --body \
            "🎉 @${CLAIMANT} さんを回復アカウント **#${number}** として登録しました。バッジ用ワークフローの次回実行から通し番号が表示されます。"
          gh issue close "$ISSUE_NUMBER" --reason "completed"
